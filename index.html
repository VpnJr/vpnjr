<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VPN — Тарифы</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 6px; text-align: center; }

    .sub { color: #666; font-size: .9rem; margin-bottom: 40px; text-align: center; }

    .plans {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 860px;
      width: 100%;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 28px 24px;
      width: 260px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      transition: border-color .2s;
    }
    .card:hover { border-color: #444; }
    .card.best { border-color: #00e5ff; box-shadow: 0 0 30px rgba(0,229,255,0.1); }

    .badge {
      position: absolute;
      top: -12px; left: 50%;
      transform: translateX(-50%);
      background: #00e5ff; color: #0f0f0f;
      font-size: .65rem; font-weight: 800;
      letter-spacing: 1.5px; padding: 4px 14px;
      border-radius: 20px; white-space: nowrap;
    }

    /* Название товара из Digiseller */
    .product-name {
      font-size: .75rem; font-weight: 600;
      color: #555; text-transform: uppercase;
      letter-spacing: 1.5px; min-height: 14px;
    }
    .product-name.loading { animation: blink 1s ease infinite; }

    @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }

    /* Цена */
    .price {
      font-size: 2.8rem; font-weight: 800;
      line-height: 1; margin: 8px 0 2px;
      min-height: 45px;
    }
    .price sup {
      font-size: 1.1rem; font-weight: 600;
      vertical-align: super; margin-right: 2px; color: #aaa;
    }
    .price.loading {
      font-size: 1rem; color: #333;
      display: flex; align-items: center;
    }

    .price-note { font-size: .8rem; color: #555; margin-bottom: 16px; min-height: 18px; }

    /* Статус наличия */
    .stock-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .72rem; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      width: fit-content; margin-bottom: 4px;
    }
    .stock-badge.in-stock { background: rgba(0,255,153,.08); color: #00ff99; }
    .stock-badge.out-stock { background: rgba(255,80,80,.08); color: #ff5050; }
    .stock-badge .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor;
    }

    .divider { height: 1px; background: #2a2a2a; margin: 4px 0 14px; }

    .features {
      list-style: none; display: flex;
      flex-direction: column; gap: 8px;
      flex: 1; margin-bottom: 20px;
    }
    .features li {
      font-size: .85rem; color: #aaa;
      display: flex; align-items: center; gap: 8px;
    }
    .features li::before { content: '✓'; color: #00e5ff; font-weight: 700; flex-shrink: 0; }

    .btn {
      display: block; text-align: center;
      padding: 12px; border-radius: 10px;
      font-size: .9rem; font-weight: 700;
      font-family: 'Inter', sans-serif;
      text-decoration: none; cursor: pointer;
      transition: opacity .2s, transform .15s;
      pointer-events: auto;
    }
    .btn:hover { opacity: .85; transform: translateY(-1px); }
    .btn.disabled { opacity: .35; pointer-events: none; cursor: not-allowed; }

    .btn-outline { background: transparent; border: 1px solid #333; color: #f0f0f0; }
    .btn-fill { background: #00e5ff; color: #0f0f0f; border: none; }

    .note { margin-top: 32px; font-size: .78rem; color: #444; text-align: center; }

    /* Распродажа */
    .sale-badge {
      font-size: .7rem; font-weight: 700;
      background: rgba(255,180,0,.12); color: #ffb400;
      border-radius: 6px; padding: 2px 8px;
      margin-left: 6px; vertical-align: middle;
    }
    .old-price {
      font-size: .85rem; color: #444;
      text-decoration: line-through; margin-left: 4px;
    }
  </style>
</head>
<body>

  <h1>Выберите тариф</h1>
  <p class="sub">Оплата через Digiseller — мгновенная доставка ключа на email</p>

  <div class="plans" id="plans">

    <!--
      data-product-id  — ID товара в Digiseller
      data-label       — Подпись под ценой (период)
      data-features    — Список фич через | (показываются всегда)
      data-best        — true = выделенная карточка
      data-badge       — текст бейджа (необязательно)
    -->

    <script>!function(e){var l=function(l){return e.cookie.match(new RegExp("(?:^|; )digiseller-"+l+"=([^;]*)"))},i=l("lang"),s=l("cart_uid"),t=i?"&lang="+i[1]:"",d=s?"&cart_uid="+s[1]:"",r=e.getElementsByTagName("head")[0]||e.documentElement,n=e.createElement("link"),a=e.createElement("script");n.type="text/css",n.rel="stylesheet",n.id="digiseller-css",n.href="//shop.digiseller.com/xml/store2_css.asp?seller_id=1202840",a.async=!0,a.id="digiseller-js",a.src="//digiseller.com/store2/digiseller-api.js.asp?seller_id=1202840"+t+d,!e.getElementById(n.id)&&r.appendChild(n),!e.getElementById(a.id)&&r.appendChild(a)}(document);</script>

    <span class="digiseller-body" id="digiseller-body" data-partner-id="" data-cat="h" data-logo="1" data-downmenu="1" data-purchases="1" data-langs="1" data-cart="1" data-search="1"></span>



  </div>

  <p class="note">🔐 Оплата защищена · Digiseller · Ключ придёт на email сразу после оплаты</p>

  <script>
    const DIGISELLER_API = 'https://api.digiseller.com/api/products/{id}/data?currency=RUB&lang=ru-RU&format=json&transp=cors';
    const PAY_URL = 'https://oplata.info/asp2/pay_wm.asp?id_d={id}&lang=ru-RU';

    function formatPrice(num) {
      return Math.round(num).toLocaleString('ru-RU');
    }

    function renderSkeleton(card) {
      const badge = card.dataset.badge;
      const btnClass = card.dataset.btnClass || 'btn-outline';
      const features = (card.dataset.features || '').split('|').filter(Boolean);

      card.innerHTML = `
        ${badge ? `<div class="badge">${badge}</div>` : ''}
        <div class="product-name loading">загрузка…</div>
        <div class="price loading">—</div>
        <div class="price-note"></div>
        <div class="stock-badge in-stock"><span class="dot"></span> В наличии</div>
        <div class="divider"></div>
        <ul class="features">
          ${features.map(f => `<li>${f}</li>`).join('')}
        </ul>
        <a href="#" class="btn ${btnClass} disabled" target="_blank" rel="noopener">Купить</a>
      `;
    }

    function applyData(card, data) {
      const product = data.product;
      const id = card.dataset.productId;
      const label = card.dataset.label || '';
      const btnClass = card.dataset.btnClass || 'btn-outline';
      const features = (card.dataset.features || '').split('|').filter(Boolean);

      const priceRub = product.prices?.default
        ? (product.prices.default.find(p => p.currency === 'RUB')?.price || product.price)
        : product.price;

      const isAvailable = product.is_available === 1;
      const salePercent = product.sale_info?.sale_percent || 0;
      const oldPriceRub = product.sale_info?.common_price_rub || 0;

      const priceHtml = isAvailable
        ? `<sup>₽</sup>${formatPrice(priceRub)}${salePercent > 0 ? `<span class="sale-badge">-${salePercent}%</span>` : ''}${salePercent > 0 && oldPriceRub ? `<span class="old-price">₽${formatPrice(oldPriceRub)}</span>` : ''}`
        : `<sup>₽</sup>—`;

      const stockHtml = isAvailable
        ? `<div class="stock-badge in-stock"><span class="dot"></span> В наличии</div>`
        : `<div class="stock-badge out-stock"><span class="dot"></span> Нет в наличии</div>`;

      const badge = card.dataset.badge;

      card.innerHTML = `
        ${badge ? `<div class="badge">${badge}</div>` : ''}
        <div class="product-name">${product.name || ''}</div>
        <div class="price">${priceHtml}</div>
        <div class="price-note">${label}</div>
        ${stockHtml}
        <div class="divider"></div>
        <ul class="features">
          ${features.map(f => `<li>${f}</li>`).join('')}
        </ul>
        <a href="${PAY_URL.replace('{id}', id)}"
           class="btn ${btnClass}${!isAvailable ? ' disabled' : ''}"
           target="_blank" rel="noopener">
          Купить
        </a>
      `;
    }

    function applyError(card) {
      const badge = card.dataset.badge;
      const btnClass = card.dataset.btnClass || 'btn-outline';
      const features = (card.dataset.features || '').split('|').filter(Boolean);
      const id = card.dataset.productId;
      const label = card.dataset.label || '';

      card.innerHTML = `
        ${badge ? `<div class="badge">${badge}</div>` : ''}
        <div class="product-name" style="color:#555">—</div>
        <div class="price" style="color:#333">—</div>
        <div class="price-note">${label}</div>
        <div class="divider"></div>
        <ul class="features">
          ${features.map(f => `<li>${f}</li>`).join('')}
        </ul>
        <a href="${PAY_URL.replace('{id}', id)}"
           class="btn ${btnClass}"
           target="_blank" rel="noopener">
          Купить
        </a>
      `;
    }

    async function loadProduct(card) {
      const id = card.dataset.productId;
      if (!id) return;

      renderSkeleton(card);

      try {
        const url = DIGISELLER_API.replace('{id}', id);
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (data.retval !== 0) throw new Error('API error: ' + data.retdesc);
        applyData(card, data);
      } catch (e) {
        console.warn('Digiseller fetch error for', id, e);
        applyError(card);
      }
    }

    document.querySelectorAll('.card[data-product-id]').forEach(loadProduct);
  </script>

</body>
</html>
