<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pascal VPN</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 48px;
    }
    .logo span { color: #60a5fa; }

    .card {
      background: #181818;
      border: 1px solid #272727;
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 340px;
      text-align: center;
    }

    .plan-name {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 16px;
    }

    .price {
      font-size: 3.2rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }
    .price sup {
      font-size: 1.2rem;
      font-weight: 600;
      vertical-align: super;
      color: #aaa;
      margin-right: 2px;
    }

    .price-sub {
      font-size: .82rem;
      color: #444;
      margin-bottom: 28px;
    }

    .divider {
      height: 1px;
      background: #222;
      margin-bottom: 20px;
    }

    .features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 28px;
      text-align: left;
    }
    .features li {
      font-size: .88rem;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .features li::before {
      content: '✓';
      color: #60a5fa;
      font-weight: 700;
      flex-shrink: 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #60a5fa;
      color: #080808;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    .btn:hover {
      opacity: .88;
      transform: translateY(-1px);
    }

    .footer-note {
      margin-top: 24px;
      font-size: .72rem;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo">Pascal<span>VPN</span></div>

  <div class="card">
    <div class="plan-name">Подписка</div>
    <div class="price"><sup>₽</sup>249</div>
    <div class="price-sub">1 месяц</div>
    <div class="divider"></div>
    <ul class="features">
      <li>Все устройства</li>
      <li>Опалата по SberPay без комиссии</li>
      <li>Без логов</li>
      <li>Ключ сразу на email</li>
    </ul>
    <a class="btn" href="https://oplata.info/asp2/pay_wm.asp?id_d=5788788&lang=ru-RU" target="_blank" rel="noopener">
      Оплатить
    </a>
  </div>

  <div class="footer-note">🔐 Безопасная оплата через Digiseller</div>

</body>
</html>
